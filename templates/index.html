<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Market DNA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>td { vertical-align: middle; }</style>
</head>
<body class="bg-light p-4">
    <div class="container">
        <h3>🧬 Market DNA <small class="text-muted">({{ stocks|length }} stocks)</small></h3>
        <div class="card shadow-sm mt-3">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr><th>Ticker</th><th>Latest Volatility</th><th>5-Year Trend</th></tr>
                </thead>
                <tbody>
                    {% for s in stocks %}
                    <tr>
                        <td class="fw-bold">{{ s.ticker }}</td>
                        <td><span class="badge {{ 'bg-success' if s.last_val > 0 else 'bg-danger' }}">{{ s.last_val }} σ</span></td>
                        <td>{{ s.chart|safe }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
