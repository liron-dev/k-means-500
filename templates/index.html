<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live S&P 500 List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .ticker-box { font-weight: bold; font-family: monospace; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4">📈 Current S&P 500 Tickers</h1>
        <div class="alert alert-info">
            Live from Wikipedia: <strong>{{ count }}</strong> companies found.
        </div>

        <div class="row g-2">
            {% for ticker in tickers %}
            <div class="col-6 col-md-2">
                <div class="card p-2 text-center shadow-sm ticker-box">
                    {{ ticker }}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
